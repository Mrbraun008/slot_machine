
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sloty</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/slot.js" defer></script>
</head>
<body>

<div id="container">

    <!-- Decorative top lights -->
    <div class="top-lights">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- Machine title -->
    <div class="machine-title">
        <span class="title-star">★</span>
        LUCKY REELS
        <span class="title-star">★</span>
    </div>

    <!-- Reels window — same structure as your original -->
    <div class="window-border">
        <div class="window">
            <div class="outer-spacer"></div>
            <div class="outer-col">
                <div class="col"></div>
            </div>
            <div class="outer-spacer"></div>
            <div class="outer-col">
                <div class="col"></div>
            </div>
            <div class="outer-spacer"></div>
            <div class="outer-col">
                <div class="col"></div>
            </div>
            <div class="outer-spacer"></div>
            <div class="outer-col">
                <div class="col"></div>
            </div>
            <div class="outer-spacer"></div>
            <div class="outer-col">
                <div class="col"></div>
            </div>
            <div class="outer-spacer"></div>

            <!-- Center payline indicator -->
            <div class="payline"></div>
        </div>
    </div>

    <!-- Spin button -->
    <input type="button" onclick="spin(this)" class="start-button" value="★  SPIN  ★"/>

    <!-- Bottom lights -->
    <div class="bottom-lights">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>

</div>

</body>
</html>
